naftiko: "1.0.0-alpha1"

info:
  label: TIAA Secure Income Account API
  description: >-
    TIAA SIA API enables recordkeepers and plan administrators to integrate
    TIAA's guaranteed lifetime income product into defined contribution plans,
    supporting participant enrollment, contribution management, and income
    projections.
  tags:
    - TIAA
    - Guaranteed Income
    - Plan Administration
    - Retirement
    - Secure Income
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TIAA_SIA_ACCESS_TOKEN: TIAA_SIA_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: tiaa-sia
      baseUri: https://api.tiaa.org/sia/v1
      description: TIAA Secure Income Account API for plan administration
      authentication:
        type: bearer
        token: "{{TIAA_SIA_ACCESS_TOKEN}}"
      resources:
        - name: plans
          path: /plans/{planId}
          description: Plan configuration and eligibility
          operations:
            - name: get-plan
              method: GET
              description: Get SIA configuration for a plan
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: Unique plan identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: participants
          path: /plans/{planId}/participants
          description: Participant enrollment and management
          operations:
            - name: list-participants
              method: GET
              description: List plan participants enrolled in SIA
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: Unique plan identifier
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: Page size
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: enroll-participant
              method: POST
              description: Enroll a participant in the SIA product
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: Unique plan identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  dateOfBirth: "{{tools.dateOfBirth}}"
                  ssn: "{{tools.ssn}}"
                  email: "{{tools.email}}"
                  allocationPercentage: "{{tools.allocationPercentage}}"

            - name: get-participant
              method: GET
              description: Get SIA account details for a participant
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: Unique plan identifier
                - name: participantId
                  in: path
                  type: string
                  required: true
                  description: Unique participant identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: contributions
          path: /plans/{planId}/contributions
          description: Contribution submission
          operations:
            - name: submit-contribution
              method: POST
              description: Submit a contribution to a participant's SIA account
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: Unique plan identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  participantId: "{{tools.participantId}}"
                  amount: "{{tools.amount}}"
                  contributionType: "{{tools.contributionType}}"
                  payrollDate: "{{tools.payrollDate}}"

        - name: projections
          path: /plans/{planId}/participants/{participantId}/projections
          description: Income projections
          operations:
            - name: get-income-projection
              method: GET
              description: Get projected lifetime income for a participant
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: Unique plan identifier
                - name: participantId
                  in: path
                  type: string
                  required: true
                  description: Unique participant identifier
                - name: retirementAge
                  in: query
                  type: integer
                  required: false
                  description: Target retirement age
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: tiaa-sia-rest
      resources:
        - path: /v1/plans/{planId}
          name: plan
          description: Plan details
          operations:
            - method: GET
              name: get-plan
              description: Get SIA plan configuration
              call: "tiaa-sia.get-plan"
              with:
                planId: "rest.planId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/plans/{planId}/participants
          name: participants
          description: Plan participants
          operations:
            - method: GET
              name: list-participants
              description: List participants in plan
              call: "tiaa-sia.list-participants"
              with:
                planId: "rest.planId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tiaa-sia-mcp
      transport: http
      tools:
        - name: get-plan
          description: Get SIA plan configuration and eligibility rules
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-sia.get-plan"
          with:
            planId: "tools.planId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-participants
          description: List participants enrolled in SIA for a plan
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-sia.list-participants"
          with:
            planId: "tools.planId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-income-projection
          description: Get projected lifetime income for a plan participant
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-sia.get-income-projection"
          with:
            planId: "tools.planId"
            participantId: "tools.participantId"
            retirementAge: "tools.retirementAge"
          outputParameters:
            - type: object
              mapping: "$."
