naftiko: "1.0.0-alpha1"

info:
  label: TIAA Financial Data Exchange API
  description: >-
    TIAA FDX API provides authorized fintechs and financial aggregators with
    secure, customer-consented access to TIAA retirement and brokerage account
    data including balances, transactions, investment positions, and tax forms.
  tags:
    - TIAA
    - Financial Data
    - FDX
    - Open Finance
    - Retirement
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TIAA_FDX_ACCESS_TOKEN: TIAA_FDX_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: tiaa-fdx
      baseUri: https://api.tiaa.org/fdx/v6
      description: TIAA Financial Data Exchange API for account and transaction data
      authentication:
        type: bearer
        token: "{{TIAA_FDX_ACCESS_TOKEN}}"
      resources:
        - name: accounts
          path: /accounts
          description: Customer account management
          operations:
            - name: list-accounts
              method: GET
              description: List all accounts for the authenticated customer
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of accounts to return
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-account
              method: GET
              description: Get details for a specific account
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: Unique account identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: transactions
          path: /accounts/{accountId}/transactions
          description: Account transaction history
          operations:
            - name: list-transactions
              method: GET
              description: List transactions for a specific account within an optional date range
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: Unique account identifier
                - name: startTime
                  in: query
                  type: string
                  required: false
                  description: Start of transaction date range (ISO 8601)
                - name: endTime
                  in: query
                  type: string
                  required: false
                  description: End of transaction date range (ISO 8601)
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of transactions to return
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: positions
          path: /accounts/{accountId}/positions
          description: Investment positions and holdings
          operations:
            - name: list-positions
              method: GET
              description: List investment positions for a specific account
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: Unique account identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customer
          path: /customer
          description: Customer profile information
          operations:
            - name: get-customer
              method: GET
              description: Get the authenticated customer's profile
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tax-forms
          path: /tax-forms
          description: Tax document access
          operations:
            - name: list-tax-forms
              method: GET
              description: List available tax forms for the customer
              inputParameters:
                - name: taxYear
                  in: query
                  type: integer
                  required: false
                  description: Filter by tax year
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: tiaa-fdx-rest
      resources:
        - path: /v1/accounts
          name: accounts
          description: Account access via TIAA FDX API
          operations:
            - method: GET
              name: list-accounts
              description: List all customer accounts
              call: "tiaa-fdx.list-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/accounts/{accountId}
          name: account-detail
          description: Single account detail
          operations:
            - method: GET
              name: get-account
              description: Get specific account details
              call: "tiaa-fdx.get-account"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/accounts/{accountId}/transactions
          name: transactions
          description: Account transactions
          operations:
            - method: GET
              name: list-transactions
              description: List account transactions
              call: "tiaa-fdx.list-transactions"
              with:
                accountId: "rest.accountId"
                startTime: "rest.startTime"
                endTime: "rest.endTime"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tiaa-fdx-mcp
      transport: http
      tools:
        - name: list-accounts
          description: List all TIAA accounts for the authenticated customer
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-fdx.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-account
          description: Get details for a specific TIAA account
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-fdx.get-account"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-transactions
          description: List transactions for a TIAA account within a date range
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-fdx.list-transactions"
          with:
            accountId: "tools.accountId"
            startTime: "tools.startTime"
            endTime: "tools.endTime"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-positions
          description: List investment positions for a TIAA account
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-fdx.list-positions"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-customer
          description: Get the authenticated customer's profile
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-fdx.get-customer"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-tax-forms
          description: List available tax forms for the customer
          hints:
            readOnly: true
            openWorld: false
          call: "tiaa-fdx.list-tax-forms"
          with:
            taxYear: "tools.taxYear"
          outputParameters:
            - type: object
              mapping: "$."
