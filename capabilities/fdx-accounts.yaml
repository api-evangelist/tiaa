naftiko: 1.0.0-alpha2
info:
  label: TIAA Financial Data Exchange API — Accounts
  description: 'TIAA Financial Data Exchange API — Accounts. 2 operations. Lead operation: List Customer Accounts. Self-contained
    Naftiko capability covering one Tiaa business surface.'
  tags:
  - Tiaa
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TIAA_API_KEY: TIAA_API_KEY
capability:
  consumes:
  - type: http
    namespace: fdx-accounts
    baseUri: https://api.tiaa.org/fdx/v6
    description: TIAA Financial Data Exchange API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: listaccounts
        method: GET
        description: List Customer Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: Pagination offset
        - name: limit
          in: query
          type: integer
          description: Maximum number of accounts to return
    - name: accounts-accountId
      path: /accounts/{accountId}
      operations:
      - name: getaccount
        method: GET
        description: Get Account Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: Unique account identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.TIAA_API_KEY}}'
  exposes:
  - type: rest
    namespace: fdx-accounts-rest
    port: 8080
    description: REST adapter for TIAA Financial Data Exchange API — Accounts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: listaccounts
        description: List Customer Accounts
        call: fdx-accounts.listaccounts
        with:
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}
      name: accounts-accountid
      description: REST surface for accounts-accountId.
      operations:
      - method: GET
        name: getaccount
        description: Get Account Details
        call: fdx-accounts.getaccount
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fdx-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for TIAA Financial Data Exchange API — Accounts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-customer-accounts
      description: List Customer Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fdx-accounts.listaccounts
      with:
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account-details
      description: Get Account Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fdx-accounts.getaccount
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
