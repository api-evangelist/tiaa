provider: TIAA
providerId: tiaa
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Finance
  - Retirement
  - Investment Management
  - B2B
description: TIAA does not operate a public API marketplace or self-service developer portal. APIs (FDX
  account aggregation, Secure Income Account, Gateway, Payroll360) are exposed to recordkeeping partners,
  plan sponsors, payroll providers, and aggregators under bilateral B2B agreements. There is no published
  rate card.
sources:
  - https://www.tiaa.org/public/about-tiaa/working-at-tiaa/api-developer
notes: TIAA APIs are gated behind partner / plan-sponsor relationships. No public pricing, no self-serve
  free tier. Reconciliation requires the executed master services or data-sharing agreement.
plans:
  - id: tiaa-contact-sales
    name: Contact Sales
    type: enterprise
    description: Bilaterally negotiated access for plan sponsors, recordkeepers, payroll providers, and
      data aggregators. Pricing, quotas, and SLAs are set in the partner agreement.
    entries:
      - label: Custom Quote
        name: custom_quote
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: TIAA Financial Data Exchange API
      - name: TIAA Secure Income Account API
      - name: TIAA Gateway API
      - name: TIAA Payroll360 API
