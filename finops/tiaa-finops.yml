meters:
  - name: contracted_partner_access
    unit: varies
    aggregation: sum
    dimensions:
      - api
      - partner
principles:
  - name: Visibility
    description: Rely on the partner-portal dashboards and contractual usage statements TIAA provides;
      no public usage API exists.
  - name: Allocation
    description: Allocate the partner contract cost to the retirement, payroll, or wealth team that owns
      the integration with TIAA.
  - name: Optimization
    description: Optimize at the integration design layer — batch FDX aggregation calls, cache participant
      reference data, and avoid duplicate Payroll360 submissions.
  - name: Accountability
    description: A named partnership owner is accountable for the TIAA agreement, data-sharing scope,
      and renewal cadence.
