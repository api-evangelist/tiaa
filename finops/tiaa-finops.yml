description: 'FOCUS-aligned FinOps placeholder for TIAA: B2B retirement and recordkeeping APIs delivered
  under bilateral partner contracts; no public usage-based rate card.'
sources:
  - https://www.tiaa.org/public/about-tiaa/working-at-tiaa/api-developer
  - https://focus.finops.org/focus-specification/v1-3/
notes: TIAA APIs are not sold on a usage-based public rate card; FinOps observability is whatever the
  partner agreement provides (typically invoice-line allocations, not per-call telemetry).
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
